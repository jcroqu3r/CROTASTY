		<script>
			(function () {
				const headings = document.querySelectorAll("h1, .contact-row__value, .tip-card h2");

				if (!headings.length) {
					return;
				}

				const createLettersFragment = (text) => {
					const fragment = document.createDocumentFragment();

					const tokens = text.replace(/[\n\r\t]+/g, " ").split(/(\s+)/);

					tokens.forEach((token) => {
						if (!token) {
							return;
						}

						if (/^\s+$/.test(token)) {
							fragment.appendChild(document.createTextNode(" "));
							return;
						}

						const word = document.createElement("span");
						word.className = "h1-word";

						for (const char of token) {
							const letter = document.createElement("span");
							letter.className = "h1-letter";
							letter.textContent = char;
							word.appendChild(letter);
						}

						fragment.appendChild(word);
					});

					return fragment;
				};

				const wrapLettersRecursively = (node) => {
					if (node.nodeType === Node.TEXT_NODE) {
						const parent = node.parentElement;

						if (parent && (parent.classList.contains("h1-letter") || parent.classList.contains("h1-word"))) {
							return;
						}

						node.replaceWith(createLettersFragment(node.textContent || ""));
						return;
					}

					if (node.nodeType !== Node.ELEMENT_NODE) {
						return;
					}

					if (node.classList.contains("h1-letter") || node.classList.contains("h1-word")) {
						return;
					}

					Array.from(node.childNodes).forEach(wrapLettersRecursively);
				};

				headings.forEach((heading) => {
					if (heading.dataset.lettersReady === "true") {
						return;
					}

					wrapLettersRecursively(heading);
					heading.dataset.lettersReady = "true";
				});
			})();

			document.addEventListener('DOMContentLoaded', function () {
				setTimeout(() => {
					document.body.classList.add('page-entered');
				}, 1600);
			});
		</script>



		<script>
			(function () {
				const quoteSection = document.querySelector(".home-quote");
				if (!quoteSection) return;

				const reveal = () => {
					quoteSection.classList.add("home-quote--visible");
				};

				const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
				if (prefersReducedMotion || !("IntersectionObserver" in window)) {
					reveal();
					return;
				}

				const observer = new IntersectionObserver((entries, currentObserver) => {
					entries.forEach((entry) => {
						if (!entry.isIntersecting) return;
						reveal();
						currentObserver.unobserve(entry.target);
					});
				}, {
					threshold: 0.28,
					rootMargin: "0px 0px -12% 0px"
				});

				observer.observe(quoteSection);
			})();
		</script>

		<script>
			(function () {
				const dot = document.querySelector('.cursor-dot');
				const ring = document.querySelector('.cursor-ring');
				if (!dot || !ring) return;

				let mouseX = window.innerWidth / 2;
				let mouseY = window.innerHeight / 2;
				let ringX = mouseX;
				let ringY = mouseY;
				const lerp = 0.12;

				document.addEventListener('mousemove', function (e) {
					mouseX = e.clientX;
					mouseY = e.clientY;
					dot.style.left = mouseX + 'px';
					dot.style.top = mouseY + 'px';
				});

				document.addEventListener('mouseleave', function () {
					dot.style.opacity = '0';
					ring.style.opacity = '0';
				});

				document.addEventListener('mouseenter', function () {
					dot.style.opacity = '';
					ring.style.opacity = '';
				});

				const hoverTargets = 'a, button, [role="button"], input, label, select, textarea';

				document.addEventListener('mouseover', function (e) {
					if (e.target.closest(hoverTargets)) {
						dot.classList.add('is-hovering');
						ring.classList.add('is-hovering');
					}
				});

				document.addEventListener('mouseout', function (e) {
					if (e.target.closest(hoverTargets)) {
						dot.classList.remove('is-hovering');
						ring.classList.remove('is-hovering');
					}
				});

				function animateRing() {
					ringX += (mouseX - ringX) * lerp;
					ringY += (mouseY - ringY) * lerp;
					ring.style.left = ringX + 'px';
					ring.style.top = ringY + 'px';
					requestAnimationFrame(animateRing);
				}

				animateRing();
			})();
		</script>
</body>
